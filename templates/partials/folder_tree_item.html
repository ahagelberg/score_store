<li class="folder-tree-item drop-target{% if is_child|default(false) %} folder-tree-child{% endif %}"
    data-drop-kind="folder"
    data-folder-id="{{ folder.id }}"
    data-library-ctx="{{ library_panel.library_ctx }}">
  <a class="folder-tree-link{% if folder.id == 'root' %} active{% endif %}"
     data-folder-id="{{ folder.id }}"
     href="#">
    <span class="folder-tree-icon" aria-hidden="true">📁</span>
    <span class="folder-tree-name">{{ folder.name }}</span>
  </a>
  {% if library_panel.can_manage_folders and folder.id != 'root' %}
  <button type="button" class="btn-icon btn-icon-sm delete-folder-btn"
          data-folder-id="{{ folder.id }}"
          data-library-ctx="{{ library_panel.library_ctx }}"
          title="Delete folder">×</button>
  {% endif %}
</li>
