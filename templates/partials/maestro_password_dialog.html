<div class="dialog-overlay hidden" id="maestro-password-overlay" data-dialog="maestro-password">
  <div class="dialog" role="dialog" aria-labelledby="maestro-password-title">
    <h2 id="maestro-password-title">Change password</h2>
    <form id="maestro-password-form" method="post" action="{{ url_for('maestro_change_password') }}">
      {% include "partials/csrf_field.html" %}
      <div class="form-group">
        <label for="maestro-current-password">Current password</label>
        <input class="form-control" type="password" id="maestro-current-password" name="current_password" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="maestro-new-password">New password</label>
        <input class="form-control" type="password" id="maestro-new-password" name="new_password" required autocomplete="new-password" minlength="{{ password_min_len }}">
        <small class="score-summary-meta">At least {{ password_min_len }} characters</small>
      </div>
      <div class="form-group">
        <label for="maestro-new-password-confirm">Confirm new password</label>
        <input class="form-control" type="password" id="maestro-new-password-confirm" name="new_password_confirm" required autocomplete="new-password" minlength="{{ password_min_len }}">
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn" data-maestro-password-close>Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
