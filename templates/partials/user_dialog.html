<div class="dialog-overlay hidden" id="user-dialog-overlay" data-dialog="user">
  <div class="dialog" role="dialog" aria-labelledby="user-dialog-title">
    <h2 id="user-dialog-title">Add user</h2>
    <form id="user-dialog-form" method="post"{% if preview_mode and request.args.get('preview') %} data-preview-token="{{ request.args.get('preview') }}"{% endif %}>
      {% include "partials/csrf_field.html" %}
      {% if preview_mode and request.args.get('preview') %}
      <input type="hidden" name="preview" value="{{ request.args.get('preview') }}">
      {% endif %}
      <input type="hidden" name="user_id" id="user-dialog-user-id" value="">
      <div class="form-group">
        <label for="user-display-name">Display name</label>
        <input class="form-control" type="text" id="user-display-name" name="display_name" required>
      </div>
      <div class="form-group">
        <label for="user-username">Username</label>
        <input class="form-control" type="text" id="user-username" name="username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="user-password">Password</label>
        <input class="form-control" type="password" id="user-password" name="password" autocomplete="new-password">
        <small class="score-summary-meta" id="user-password-hint">Required for new users</small>
      </div>
      <div class="form-group">
        <label for="user-role">Role</label>
        <select class="form-control" id="user-role" name="role">
          <option value="singer">Singer</option>
          <option value="choir">Choir</option>
        </select>
      </div>
      <div class="dialog-actions">
        <div class="dialog-actions-start">
          <button type="button" class="btn btn-sm hidden" id="user-handout-btn">Account handout</button>
          <button type="button" class="btn btn-danger hidden" id="user-delete-btn">Delete</button>
        </div>
        <button type="button" class="btn" data-dialog-close>Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
